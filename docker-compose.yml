version: "3.8"
services:
  neo4j:
    image: neo4j:5.7
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j}"
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"

  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  neo4j_data:
