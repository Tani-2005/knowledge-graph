name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install -r requirements.txt
      - name: Run unit tests
        run: |
          python -m unittest discover -v tests

  integration:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      neo4j:
        image: neo4j:5.7
        env:
          NEO4J_AUTH: neo4j/neo4j
          NEO4J_ACCEPT_LICENSE_AGREEMENT: 'yes'
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "curl -s http://localhost:7474/" --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: python -m pip install -r requirements.txt
      - name: Run integration smoke
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: neo4j
        run: |
          python - <<'PY'
          from src.neo4j_setup import ensure_constraints
          ensure_constraints('bolt://localhost:7687', 'neo4j', 'neo4j')
          print('constraints applied')
          PY
